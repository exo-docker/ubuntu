name: Build & publish eXo Ubuntu images
on:
  schedule:
    - cron:  '0 20 * * 6' # Every Saturday at 8 PM UTC
  workflow_dispatch:

jobs:
  build-ubuntu-images:
    name: "Build Ubuntu Images"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 20.04
          - context: 20.04
            imageTag: 20,20.04

          # Ubuntu 22.04
          - context: 22.04
            imageTag: 22,22.04

          # Ubuntu 24.04
          - context: 24.04
            imageTag: 24,24.04

          # Ubuntu 26.04 (latest)
          - context: 26.04
            imageTag: 26,26.04,latest
            platforms: linux/arm64,linux/amd64

          # Rolling
          - context: rolling
            imageTag: rolling
            platforms: linux/arm64,linux/amd64
    steps:
      - name: "Build and push Docker images"
        uses: exo-actions/buildDockerImage-action@v1
        with:
          dockerImage: "exoplatform/ubuntu"
          dockerImageTag: ${{ matrix.imageTag }}
          dockerFileContext: ${{ matrix.context }}
          platforms: ${{ matrix.platforms }}
          attestImage: true
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}